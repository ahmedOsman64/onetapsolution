<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OneTap Solution</title>
    <!-- Favicon -->
    <link rel="icon" href="assets/images/One_Tap_logo_-cadaaan-01.png" type="image/png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="admin.css">
    <style>
        body {
            background: radial-gradient(circle at center, #0a0c10 0%, #050608 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: rgba(15, 18, 24, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(0, 243, 255, 0.1), transparent);
            border-radius: 26px;
            z-index: -1;
            pointer-events: none;
        }

        .login-logo {
            width: 70px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.3));
        }

        .login-header h1 {
            color: var(--white);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-gray);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 14px 14px 48px;
            color: var(--white);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .login-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .login-input:focus + i {
            color: var(--primary-neon);
        }

        .login-btn {
            width: 100%;
            background: var(--primary-neon);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 243, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 24px;
        }

        .back-link {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--white);
        }

        .error-message {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: var(--primary-neon);
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(1px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-100vh) translateX(50px); }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/images/One_Tap_logo_-cadaaan-01.png" alt="OneTap Logo" class="login-logo">
                <h1>Login</h1>
                <p>OneTap Solution </p>
            </div>

            <div id="error-box" class="error-message">
                <i class="fas fa-exclamation-circle"></i> Invalid Email or Password!
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>E-mail Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="login-input" placeholder="Enter Your Email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="login-input" placeholder="Enter Your Password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span>Login to Dashboard</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- We include admin.js but handle the login specifically -->
    <script src="admin.js"></script>
    <script>
        // Custom particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(p);
        }

        // Login Logic
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            if (window.handleLogin(email, password)) {
                window.location.href = 'admin.html';
            } else {
                errorBox.style.display = 'block';
                // Shake effect
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = 'shake 0.5s ease-in-out';
            }
        };

        // Add shake keyframes dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
